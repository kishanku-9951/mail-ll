name: 🚀 Ultra Bot Runner

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min auto restart

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ⚡ Install deps (FAST)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔥 Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
        run: |
          echo "Starting bot..."
          python bot.py
